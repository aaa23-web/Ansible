---
- name: Scenario 1 - Install and configure Nginx (DevSecOps baseline)
  hosts: web
  become: true

  pre_tasks:
    # Комментарий: базовые пакеты
    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: yes

  roles:
    - nginx
